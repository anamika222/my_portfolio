{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog | Drive To Traffic</title>
<meta name="description" content="Digital marketing blog with weekly content & videos">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100">

<header
  id="header"
  class="fixed top-0 w-full z-50
         bg-blue-300 dark:bg-gray-900/80
         backdrop-blur shadow
         transition-colors duration-300">

  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">

    <div class="flex items-center space-x-3">
      <img src="{% static 'logo.jpg' %}" class="h-10 w-auto">
      <div>
        <h1 class="text-lg font-bold text-blue-800 dark:text-teal-400">
          Soptok Chatterjee
        </h1>
        <p class="text-sm text-teal-600 dark:text-gray-400">
          Digital Marketer & Mentor
        </p>
      </div>
    </div>

    <div class="flex items-center space-x-6">
      <nav class="hidden md:flex gap-8">
         <a href="/" class="hover:text-teal-600">Home</a>
         
<div class="relative group">
  <button
    class="flex items-center gap-1 hover:text-teal-600 focus:outline-none">
    Services
    <svg xmlns="http://www.w3.org/2000/svg"
         class="w-4 h-4 mt-0.5 transition-transform group-hover:rotate-180"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <div
    class="absolute left-0 mt-3 w-48
           bg-white dark:bg-gray-900
           rounded-xl shadow-xl
           opacity-0 invisible
           group-hover:opacity-100 group-hover:visible
           transition-all duration-200">

    <a href="/course/"
       class="block px-5 py-3 hover:bg-indigo-50 dark:hover:bg-gray-800 rounded-t-xl">
      📘 Courses
    </a>

    <a href="/service/"
       class="block px-5 py-3 hover:bg-indigo-50 dark:hover:bg-gray-800 rounded-b-xl">
      🛠 Services
    </a>
  </div>
</div>

<a href="/blog/" class="hover:text-teal-600">Blog</a>
         <a href="#" class="hover:text-teal-600">Testimonial</a>
         <a href="#" class="hover:text-teal-600">Review</a>
</nav>

      <a href="#contact"
         class="hidden md:inline-block bg-orange-500 text-white px-5 py-2 rounded-lg
                hover:bg-orange-600 transition">
        Free Consultation
      </a>

      <button id="themeToggle"
        class="ml-2 text-xl p-2 rounded-lg
               bg-gray-200 dark:bg-gray-800
               text-gray-700 dark:text-gray-200
               transition">
        🌙
      </button>
    </div>
  </div>
</header>

<div class="max-w-6xl mx-auto px-6 flex flex-wrap gap-4 mb-8" style="margin-top: 100px;">
  <input id="searchInput" placeholder="Search blog..."
    class="flex-1 p-3 rounded bg-slate-800">

  <select id="categoryFilter" class="p-3 rounded bg-slate-800">
    <option value="all">All Categories</option>
    <option>Paid Ads</option>
    <option>Email Marketing</option>
    <option>Video Marketing</option>
  </select>
</div>

<div id="blogList" class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-8">
    {% for blog in blogs %}
    <div class="bg-slate-900 rounded-lg overflow-hidden shadow-lg">
        <img src="{{ blog.image.url }}" class="w-full h-48 object-cover">
        <div class="p-5">
            <h3 class="text-xl font-bold mb-2">{{ blog.title }}</h3>
            <p class="text-slate-400 text-sm mb-4">{{ blog.description|truncatechars:100 }}</p>
            <a href="/blog/{{ blog.id }}" class="text-teal-400 font-semibold">Read More →</a>
        </div>
    </div>
    {% endfor %}
</div>

<div class="text-center my-10">
  <button id="loadMore"
  class="px-6 py-3 bg-teal-500 text-slate-900 rounded font-semibold">
  Load More
  </button>
</div>

<a href="https://wa.me/8801000000000"
class="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-full shadow-lg">
💬 WhatsApp
</a>

<script src="{% static 'assets/js/blog-data.js' %}"></script>
<script src="{% static 'assets/js/blog.js' %}"></script>
</body>
</html>
