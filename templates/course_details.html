{% extends 'index.html' %}
{% load static %}

{% block content %}
<section class="py-32 bg-[#050505] min-h-screen text-white">
    <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
            
            <div class="rounded-[40px] overflow-hidden border border-white/10 shadow-2xl">
                <img src="{{ course.thumbnail.url }}" alt="{{ course.title }}" class="w-full h-auto object-cover">
            </div>

            <div class="space-y-6">
                <span class="text-[#d4af37] tracking-[0.3em] uppercase text-xs font-bold">Premium Course</span>
                <h1 class="text-5xl font-serif leading-tight">{{ course.title }}</h1>
                
                <div class="flex gap-6 text-gray-400 text-sm border-y border-white/5 py-4">
                    <span><i class="far fa-clock text-[#d4af37] mr-2"></i>{{ course.duration }}</span>
                    <span><i class="fas fa-book text-[#d4af37] mr-2"></i>{{ course.total_lessons }} Lessons</span>
                </div>

                <div class="text-gray-400 leading-relaxed text-lg">
                    {{ course.description|linebreaks }}
                </div>

                <div class="bg-[#111] p-10 rounded-[32px] border border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div>
                        <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Course Fee</p>
                        <p class="text-4xl font-serif text-white">৳ {{ course.price }}</p>
                    </div>
                    
                    {% if course.enroll_link %}
                    <a href="{{ course.enroll_link }}" target="_blank" class="w-full md:w-auto bg-[#d4af37] text-black px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-white transition-all text-center">
                        Enroll Now
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
